global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'webservices'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    scrape_interval: 15s
    scrape_timeout: 12s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'node-exporter'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'cadvisor'

  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'docker-health-exporter'
    static_configs:
      - targets: ['docker-health-exporter:8080']

  - job_name: 'tx-gateway'
    static_configs:
      - targets: ['tx-gateway:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'hyperliquid-worker'
    static_configs:
      - targets: ['hyperliquid-worker:8082']
    metrics_path: '/metrics'
    scrape_interval: 15s
