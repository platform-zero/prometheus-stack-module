groups:
  - name: container_health
    interval: 30s
    rules:
      - alert: ContainerUnhealthy
        expr: container_health_status == 0
        for: 2m
        labels:
          severity: critical
          category: health
        annotations:
          summary: "Container {{ $labels.container }} is unhealthy"
          description: "Container {{ $labels.container }} has been unhealthy for more than 2 minutes."

      - alert: ContainerDown
        expr: up{job="docker"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Container {{ $labels.container }} is down"
          description: "Container {{ $labels.container }} has been down for more than 1 minute."

      - alert: HighContainerRestartRate
        expr: rate(container_restarts_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          category: stability
        annotations:
          summary: "Container {{ $labels.container }} is restarting frequently"
          description: "Container {{ $labels.container }} has restarted {{ $value }} times in the last 5 minutes."

      - alert: MultipleServicesDown
        expr: count(container_health_status == 0) > 3
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Multiple services are unhealthy"
          description: "{{ $value }} containers are currently unhealthy. This may indicate a systemic issue."

  - name: dependency_health
    interval: 60s
    rules:
      - alert: DatabaseUnhealthy
        expr: container_health_status{container=~"postgres|postgres-ssd|mariadb|qdrant"} == 0
        for: 2m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "Database {{ $labels.container }} is unhealthy"
          description: "Critical database service {{ $labels.container }} has been unhealthy for more than 2 minutes."

      - alert: AuthenticationServiceDown
        expr: container_health_status{container=~"keycloak|keycloak-auth-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "Authentication service {{ $labels.container }} is down"
          description: "Critical authentication service {{ $labels.container }} is unavailable."

      - alert: GatewayUnhealthy
        expr: container_health_status{container=~"caddy|traefik"} == 0
        for: 1m
        labels:
          severity: critical
          category: gateway
        annotations:
          summary: "Gateway {{ $labels.container }} is unhealthy"
          description: "Gateway service {{ $labels.container }} is unhealthy. External access may be impacted."

      - alert: MonitoringServiceDown
        expr: container_health_status{container=~"prometheus|grafana|alertmanager"} == 0
        for: 3m
        labels:
          severity: warning
          category: monitoring
        annotations:
          summary: "Monitoring service {{ $labels.container }} is down"
          description: "Monitoring service {{ $labels.container }} is down. Observability may be impacted."

  - name: resource_alerts
    interval: 60s
    rules:
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.9
        for: 5m
        labels:
          severity: warning
          category: resources
        annotations:
          summary: "Container {{ $labels.container }} high memory usage"
          description: "Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of its memory limit."

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
          category: resources
        annotations:
          summary: "Container {{ $labels.container }} high CPU usage"
          description: "Container {{ $labels.container }} has sustained high CPU usage for 10 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) < 0.1
        for: 5m
        labels:
          severity: warning
          category: storage
        annotations:
          summary: "Low disk space on {{ $labels.device }}"
          description: "Disk {{ $labels.device }} on {{ $labels.instance }} has less than 10% free space."

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) < 0.05
        for: 2m
        labels:
          severity: critical
          category: storage
        annotations:
          summary: "Critical disk space on {{ $labels.device }}"
          description: "Disk {{ $labels.device }} on {{ $labels.instance }} has less than 5% free space remaining."

  - name: trading_execution_degradation
    interval: 30s
    rules:
      - alert: TradingSlippageDriftHigh
        expr: max_over_time(tx_gateway_trading_slippage_drift_bps[5m]) > 4
        for: 5m
        labels:
          severity: warning
          category: trading
        annotations:
          summary: "Slippage drift elevated for {{ $labels.strategy }} ({{ $labels.execution_mode }})"
          description: "Observed slippage drift exceeded 4 bps for strategy={{ $labels.strategy }}, exchange={{ $labels.exchange }}."

      - alert: TradingFillQualityDecayHigh
        expr: max_over_time(tx_gateway_trading_fill_quality_decay_bps[5m]) > 150
        for: 5m
        labels:
          severity: warning
          category: trading
        annotations:
          summary: "Fill quality decay detected for {{ $labels.strategy }} ({{ $labels.execution_mode }})"
          description: "Fill quality decay exceeded 150 bps for strategy={{ $labels.strategy }}, exchange={{ $labels.exchange }}."

      - alert: TradingLatencyDriftSpike
        expr: max_over_time(tx_gateway_trading_latency_drift_ms[5m]) > 120
        for: 5m
        labels:
          severity: critical
          category: trading
        annotations:
          summary: "Latency drift spike for {{ $labels.strategy }} ({{ $labels.execution_mode }})"
          description: "Latency drift exceeded 120ms for strategy={{ $labels.strategy }}, exchange={{ $labels.exchange }}."

      - alert: TradingTotalCostHigh
        expr: rate(tx_gateway_trading_total_cost_bps_sum[10m]) / clamp_min(rate(tx_gateway_trading_total_cost_bps_count[10m]), 0.00001) > 12
        for: 10m
        labels:
          severity: warning
          category: trading
        annotations:
          summary: "Total execution cost elevated for {{ $labels.strategy }} ({{ $labels.execution_mode }})"
          description: "Average total cost exceeded 12 bps over 10m for strategy={{ $labels.strategy }}, exchange={{ $labels.exchange }}."

      - alert: TradingEdgeAfterCostNegative
        expr: min_over_time(tx_gateway_trading_edge_after_cost_bps[10m]) < -12
        for: 10m
        labels:
          severity: critical
          category: trading
        annotations:
          summary: "Edge-after-cost has turned materially negative for {{ $labels.strategy }} ({{ $labels.execution_mode }})"
          description: "Edge-after-cost dropped below -12 bps for strategy={{ $labels.strategy }}, exchange={{ $labels.exchange }}."

      - alert: TradingImpactCostSpike
        expr: max_over_time(tx_gateway_trading_impact_bps[5m]) > 6
        for: 5m
        labels:
          severity: warning
          category: trading
        annotations:
          summary: "Impact cost spike for {{ $labels.strategy }} ({{ $labels.execution_mode }})"
          description: "Market impact exceeded 6 bps for strategy={{ $labels.strategy }}, exchange={{ $labels.exchange }}."

      - alert: TradingAdverseSelectionSpike
        expr: max_over_time(tx_gateway_trading_adverse_selection_bps[5m]) > 4
        for: 5m
        labels:
          severity: warning
          category: trading
        annotations:
          summary: "Adverse selection spike for {{ $labels.strategy }} ({{ $labels.execution_mode }})"
          description: "Adverse selection exceeded 4 bps for strategy={{ $labels.strategy }}, exchange={{ $labels.exchange }}."

      - alert: TradingCarryDriftSpike
        expr: max_over_time(tx_gateway_trading_funding_drift_bps[5m]) > 2.5 or min_over_time(tx_gateway_trading_funding_drift_bps[5m]) < -2.5 or max_over_time(tx_gateway_trading_basis_drift_bps[5m]) > 2.5 or min_over_time(tx_gateway_trading_basis_drift_bps[5m]) < -2.5
        for: 5m
        labels:
          severity: warning
          category: trading
        annotations:
          summary: "Funding/basis drift spike for {{ $labels.strategy }} ({{ $labels.execution_mode }})"
          description: "Funding or basis drift exceeded +/-2.5 bps for strategy={{ $labels.strategy }}, exchange={{ $labels.exchange }}."
